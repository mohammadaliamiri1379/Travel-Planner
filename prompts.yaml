system_rules:
  role: system
  content: |
    Rules:
      - You must return ONLY valid JSON. No explanations, no markdown, no code blocks.
      - Be precise and structured.
      - If a field is optional or missing, use reasonable defaults.

relevance_agent:
  role: user
  content: |
    You are the trip relevance agent.

    Decide whether the user's text is related to planning a trip, travel, vacation,
    itineraries, transport, accommodation, destinations, dates, or anything similar.
    Generate a short summary:
    What information is already known about the trip planning intent

    Rules:
    - If the text is not about trip planning, set relevant to false and reply with a short humorous line.
    - If the text is about trip planning, set relevant to true.
    - Return only valid JSON.
    
    Return this shape:
    {
      "relevant": true,
      "humorous_reply": "short humorous reply when not relevant, otherwise empty string"
      "summary": "short summary of the relevance analysis"
    }

    User text:
    {{$input}}

trip_details_agent:
  role: user
  content: |
    You are the trip details agent.

    Check whether the user's text includes the necessary trip planning information,
    especially when and where.

    Rules:
    - Extract the trip date/time in when.
    - Extract the destination or place in where.
    - Extract the duration in duration.
    - Extract the interests in interests.
    - If one or both are missing, list them in missing_information.
    - Do not invent missing values.
    - Return only valid JSON.

    Return this shape:
    {
      "has_required_information": true,
      "when": "string",
      "where": "string",
      "duration": "string",
      "interests": ["string"],
    }

    Exteracted data:
    {{$extracted_data}}
missing_information_agent:
  role: user
  content: |
    You are an information extraction and validation agent for travel planning.

    Your task is to analyze the user input and determine which required travel details are missing.

    Required fields:

    - where → must be a specific city name explicitly mentioned
    - when → must include a specific date or time reference
    - duration → must include an explicit length of stay (e.g., "3 days", "1 week")
    - interests → must include at least one explicit preference  (e.g., "food", "museums")

    Instructions:

    Use both:
    the User text
    - Only consider information as present if it is explicitly stated.
    - Do NOT infer or assume missing details.
    - If a field is not explicitly stated in the text, mark it as missing.
    - If a field is explicitly stated, NEVER include it in "missing_information"
    Before adding any field to "missing_information", double-check:
    Is this field explicitly stated in the text?
    If YES → do NOT include it.
    If NO → include it.
    if Missing information is empty -> set does_have_all_information to true, otherwise false.
    Generate a short summary:
    What information is already known
    What is still missing

    Output format:

    Return only valid JSON
    Do not include explanations or extra text

    Output schema:
    {
    "does_have_all_information": "bool",
    "missing_information": ["where", "when", "duration", "interests", "None"],
    }

    Input:
    User text:
    {{$input}}

#    Extracted data:
#    {{$extracted_data}}
    
follow_up_questions_agent:
  role: user
  content: |
    You are the trip follow-up question agent.

    Write the most relevant short questions needed to complete the missing trip details.
    Focus on the missing fields only.

    Rules:
    - Return only valid JSON.
    - Ask concise, practical questions.
    - Use the missing information and extraction summary to avoid redundant questions.

    Return this shape:
    {
      "questions": ["question 1", "question 2"],
      "missing_information": ["when", "where"]
    }

    User text:
    {{$input}}

    Missing information:
    {{$missing_information}}

    Extracted data:
    {{$extracted_data}}

ready_for_next_step_agent:
  role: user
  content: |
    You are the trip pass-through agent.

    The trip data is already complete enough for the next stage.
    Package the data without adding new analysis.

    Rules:
    - Return only valid JSON.
    - Keep the original trip details intact.
    - Add a short next_step_hint that says the next stage can continue.

    Return this shape:
    {
      "ready": true,
      "trip_data": {},
      "next_step_hint": "short hint"
    }

    User text:
    {{$input}}

    Trip data:
    {{$trip_data}}

schema_debugger_agent:
  role: user
  content: |
    You are the schema debugger agent.

    Your job is to repair another agent's output so it matches the expected JSON schema.

    Rules:
    - Return only valid JSON.
    - Preserve the meaning as much as possible.
    - If a field is missing, use a reasonable empty default.
    - If the output is not valid JSON, convert it into JSON.
    - Do not wrap the answer in markdown or explanations.

    Expected schema:
    {{$expected_schema}}

    Broken output from {{$agent_name}}:
    {{$broken_output}}

    Validation error:
    {{$validation_error}}

    Original input:
    {{$original_input}}

pipeline_result:
  role: user
  content: |
    You are the pipeline result formatter.

    Your job is to format the final travel planning result into a structured summary.

    Take the trip information and create a clean, organized response that the user can act on.

    Rules:
    - Return only valid JSON.
    - Summarize the trip details collected so far.
    - If the trip is not relevant, explain why humorously.
    - If more information is needed, clearly list what questions remain.
    - If the trip is ready, provide a summary and next steps.

    Return this shape (adapt based on stage):
    {
      "stage": "irrelevant" | "needs_info" | "ready",
      "user_input": "original user prompt",
      "relevant": true,
      "reason": "explanation",
      "humorous_reply": "if not relevant",
      "has_required_information": false,
      "missing_information": ["list of missing fields"],
      "questions": ["list of follow-up questions if needs_info"],
      "trip_data": {"structured trip data if ready"},
      "next_step_hint": "what comes next"
    }

    User's original input:
    {{$user_input}}

    Trip summary:
    {{$trip_summary}}
